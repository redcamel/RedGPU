<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control">
    <meta content="no-cache" http-equiv="Pragma">
    <meta content="0" http-equiv="Expires">
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RedGPU Examples</title>
    <meta name="description" content="Explore high-performance WebGPU examples in RedGPU.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://redcamel.github.io/RedGPU/examples/">
    <meta property="og:title" content="RedGPU Examples">
    <meta property="og:description" content="Explore high-performance WebGPU examples in RedGPU.">
    <meta property="og:image" content="https://repository-images.githubusercontent.com/223094122/24f03a80-cdcb-11ea-8297-408bf897ad1e">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://redcamel.github.io/RedGPU/examples/">
    <meta property="twitter:title" content="RedGPU Examples">
    <meta property="twitter:description" content="Explore high-performance WebGPU examples in RedGPU.">
    <meta property="twitter:image" content="https://repository-images.githubusercontent.com/223094122/24f03a80-cdcb-11ea-8297-408bf897ad1e">

    <link href="https://redcamel.github.io/RedGPU/examples/" rel="canonical">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"></noscript>

    <!-- CSS -->
    <link rel="preload" as="style" href="./exampleHelper/dist/example-helper.css" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="./exampleHelper/dist/example-helper.css"></noscript>
    
    <!-- LCP Image Preloading (Default '3D' Tab) -->
    <link rel="preload" as="image" href="./3d/helloWorld/thumb.webp" fetchpriority="high">
    <link rel="preload" as="image" href="./3d/view/singleView/thumb.webp" fetchpriority="high">
    <link rel="preload" as="image" href="./3d/view/multiView/thumb.webp" fetchpriority="high">
    <link rel="preload" as="image" href="./3d/scene/thumb.webp" fetchpriority="high">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
    </style>
</head>
<body>
<script type="module">
    import RedGPUExamples from './exampleHelper/dist/examples.js';
    new RedGPUExamples();
</script>
</body>
</html>
